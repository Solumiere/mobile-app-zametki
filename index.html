<!DOCTYPE html>
<html lang='ru'>
<head>
<meta charset='UTF-8'/>
<meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1'/>
<meta name='theme-color' content='#0A0A0B'/>
<meta name='apple-mobile-web-app-capable' content='yes'/>
<meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'/>
<link rel='manifest' href='manifest.json'/>
<link rel='apple-touch-icon' href='icon.svg'/>
<title>Мои Цели</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0A0A0B;--surface:#141416;--surface-2:#1A1A1D;--line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.15);--ink:#F4F4F2;--ink-2:#9B9B9F;--ink-3:#64646A;--accent:#F4F4F2;--accent-ink:#0A0A0B;--green:#7FC8A0;--red:#E08C84;--amber:#D8B26A;--r:16px;--r-lg:20px;}
html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
body{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:100px;}
input,textarea,select,button{font-family:inherit;}
::-webkit-scrollbar{display:none;}
.topbar{position:sticky;top:0;z-index:20;background:var(--bg);padding:18px 20px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
.tt{display:flex;flex-direction:column;gap:3px;}
.month-pill{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.09em;}
#pageTitle{font-size:25px;font-weight:680;letter-spacing:-.02em;}
#avatar{width:40px;height:40px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);color:var(--ink);font-weight:600;font-size:16px;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
.page{display:none;padding:18px 20px 0;}
.page.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
section{margin-bottom:16px;}
.hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;}
.hero-top{display:flex;justify-content:space-between;align-items:baseline;}
.hero-top>span:first-child{font-size:13px;color:var(--ink-2);}
.hero-pct{font-size:40px;font-weight:700;letter-spacing:-.03em;line-height:1;}
.track{height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden;margin-top:16px;}
.track span{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .5s ease;}
.hero-sub{font-size:13px;color:var(--ink-3);margin-top:10px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;}
.stat .sv{font-size:26px;font-weight:680;letter-spacing:-.02em;}
.stat .sl{font-size:12.5px;color:var(--ink-3);margin-top:3px;}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sec-head h2{font-size:15px;font-weight:620;}
.sec-link{background:none;border:none;color:var(--ink-3);font-size:13px;cursor:pointer;}
.list{display:flex;flex-direction:column;gap:10px;}
.empty{text-align:center;color:var(--ink-3);font-size:14px;padding:34px 16px;line-height:1.6;border:1px dashed var(--line);border-radius:var(--r);}
.row-wrap{display:flex;flex-direction:column;}
.row{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;}
.check{flex:0 0 auto;width:24px;height:24px;border-radius:8px;border:1.5px solid var(--ink-3);background:transparent;color:transparent;cursor:pointer;display:grid;place-items:center;transition:.15s;}
.check.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
.row-main{flex:1;min-width:0;cursor:pointer;}
.row-title{font-size:15px;display:flex;align-items:center;gap:8px;}
.row.is-done .row-title{color:var(--ink-3);text-decoration:line-through;}
.pdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto;}
.pdot.p-high{background:var(--red);}.pdot.p-mid{background:var(--amber);}.pdot.p-low{background:var(--green);}
.row-meta{font-size:12.5px;color:var(--ink-3);margin-top:4px;}
.row-del{flex:0 0 auto;background:none;border:none;color:var(--ink-3);cursor:pointer;padding:4px;display:grid;place-items:center;}
.chev{flex:0 0 auto;background:none;border:none;color:var(--ink-3);cursor:pointer;padding:4px;display:grid;place-items:center;transition:transform .2s;}
.chev.open{transform:rotate(180deg);}
.subs{margin:-3px 6px 0;padding:12px 15px 13px;background:var(--surface-2);border:1px solid var(--line);border-top:none;border-radius:0 0 var(--r) var(--r);display:flex;flex-direction:column;gap:10px;}
.sub{display:flex;align-items:center;gap:11px;font-size:14px;}
.scheck{flex:0 0 auto;width:19px;height:19px;border-radius:6px;border:1.5px solid var(--ink-3);background:transparent;color:transparent;cursor:pointer;display:grid;place-items:center;}
.scheck.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
.sub .sd{color:var(--ink-3);text-decoration:line-through;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;}
.habit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
.habit-name{font-size:15px;font-weight:560;cursor:pointer;flex:1;min-width:0;}
.habit-right{display:flex;align-items:center;gap:10px;flex:0 0 auto;}
.streak{font-size:12px;color:var(--amber);background:var(--surface-2);padding:4px 9px;border-radius:99px;}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day{aspect-ratio:1;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:.15s;}
.day .dn{font-size:9px;color:var(--ink-3);text-transform:uppercase;}
.day .dd{font-size:13px;color:var(--ink-2);font-weight:560;}
.day.on{background:var(--accent);border-color:var(--accent);}
.day.on .dn,.day.on .dd{color:var(--accent-ink);}
.day.today{border-color:var(--ink-2);}
.jrnl{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;}
.jrnl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.jrnl-date{font-size:13px;color:var(--ink-2);}
.jrnl-mood{font-size:20px;}
.jrnl-good{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.jrnl-good .g{font-size:14px;padding-left:14px;position:relative;}
.jrnl-good .g:before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--green);}
.jrnl-text{font-size:14px;color:var(--ink-2);line-height:1.55;}
.jrnl-del{margin-top:10px;text-align:right;}
.jrnl-del button{background:none;border:none;color:var(--ink-3);font-size:12.5px;cursor:pointer;}
.quote{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;}
.quote-t{font-size:14.5px;line-height:1.55;font-style:italic;}
.quote-a{font-size:12px;color:var(--ink-3);margin-top:8px;}
.yearw{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color .15s;}
.yearw:active{border-color:var(--line-strong);}
.yearw .yt{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--ink-2);}
.yearw .yt b{color:var(--ink);font-size:17px;font-weight:680;}
.yslead{display:flex;align-items:baseline;gap:10px;margin:-4px 0 18px;flex-wrap:wrap;}
.yslead b{font-size:34px;font-weight:700;letter-spacing:-.03em;line-height:1;}
.yslead span{font-size:13px;color:var(--ink-3);}
.ymonths{display:flex;flex-direction:column;gap:16px;}
.ym-h{font-size:12px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.ym-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.yd{aspect-ratio:1;border-radius:6px;display:grid;place-items:center;font-size:11px;font-style:normal;}
.yd.past{background:var(--accent);color:var(--accent-ink);}
.yd.cur{background:var(--accent);color:var(--accent-ink);box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--ink);}
.yd.fut{background:var(--surface-2);color:var(--ink-3);border:1px solid var(--line);}
.yleg{display:flex;gap:16px;justify-content:center;margin:20px 0 4px;font-size:12px;color:var(--ink-3);flex-wrap:wrap;}
.yleg span{display:flex;align-items:center;gap:6px;}
.yleg .yd{width:14px;height:14px;aspect-ratio:auto;}
.chart{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;}
.chart h3{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:14px;display:flex;justify-content:space-between;}
.chart h3 span:last-child{color:var(--ink-3);font-weight:500;}
.bars{width:100%;height:60px;display:block;color:var(--accent);}
.bars rect{fill:currentColor;}
.chart-cap{font-size:11px;color:var(--ink-3);margin-top:8px;}
.cbar{margin-bottom:12px;}
.cbar:last-child{margin-bottom:0;}
.cbar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.cbar-top span:last-child{color:var(--ink-3);}
.cbar-track{position:relative;height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden;}
.cbar-track span{position:absolute;left:0;top:0;height:100%;background:var(--line-strong);}
.cbar-track i{position:absolute;left:0;top:0;height:100%;background:var(--accent);}
.chips{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
.chip{flex:0 0 auto;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);font-size:13px;padding:7px 14px;border-radius:99px;cursor:pointer;white-space:nowrap;}
.chip.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
.searchbar{margin-bottom:14px;}
.seg{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px;}
.seg button{flex:1;background:none;border:none;color:var(--ink-2);font-size:13.5px;padding:9px;border-radius:8px;cursor:pointer;}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.25);}
.btn{width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn.ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line);}
.fld{display:block;margin-bottom:14px;}
.fld .lt{display:block;font-size:12.5px;color:var(--ink-3);margin-bottom:7px;}
.row2{display:flex;gap:12px;}
.row2 .fld{flex:1;}
input,textarea,select{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:13px 14px;color:var(--ink);font-size:15px;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--ink-2);}
textarea{min-height:90px;resize:vertical;}
.mood-pick{display:flex;gap:8px;}
.mood-pick button{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:10px;font-size:22px;cursor:pointer;}
.mood-pick button.on{border-color:var(--accent);background:var(--surface);}
.sub-edit{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.sub-edit input{flex:1;}
.sub-rm{flex:0 0 auto;background:none;border:none;color:var(--ink-3);cursor:pointer;padding:8px;display:grid;place-items:center;}
.swatches{display:flex;gap:10px;}
.swatch{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;box-shadow:inset 0 0 0 1px var(--line);}
.swatch.on{border-color:var(--ink);}
.rem-row{display:flex;align-items:center;gap:14px;}
.rem-row input[type=time]{flex:1;}
.switch{position:relative;display:inline-block;width:46px;height:28px;flex:0 0 auto;}
.switch input{opacity:0;width:0;height:0;}
.switch span{position:absolute;inset:0;background:var(--surface-2);border:1px solid var(--line);border-radius:99px;cursor:pointer;transition:.2s;}
.switch span:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:var(--ink-2);border-radius:50%;transition:.2s;}
.switch input:checked + span{background:var(--accent);border-color:var(--accent);}
.switch input:checked + span:before{transform:translateX(18px);background:var(--accent-ink);}
.banner{background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;font-size:14px;margin-bottom:14px;}
.banner button{margin-left:auto;background:none;border:none;color:var(--ink-2);font-size:13px;cursor:pointer;white-space:nowrap;}
.mini{font-size:11.5px;color:var(--ink-3);text-align:center;margin-top:12px;line-height:1.5;}
.msum{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;font-size:14px;color:var(--ink-2);border-bottom:1px solid var(--line);}
.mrow:last-child{border-bottom:none;}
.mrow b{color:var(--ink);font-weight:680;font-size:15px;}
.callout-note{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;font-size:14px;line-height:1.5;margin-bottom:6px;}
.fab{position:fixed;bottom:92px;right:max(20px,calc(50vw - 220px));width:56px;height:56px;border-radius:18px;background:var(--accent);color:var(--accent-ink);border:none;font-size:30px;line-height:1;cursor:pointer;display:grid;place-items:center;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:30;}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:25;}
.tab{flex:1;background:none;border:none;color:var(--ink-3);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;}
.tab svg{width:22px;height:22px;}
.tab.active{color:var(--ink);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:40;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{width:100%;max-width:480px;background:var(--surface);border-radius:var(--r-lg) var(--r-lg) 0 0;border:1px solid var(--line);border-bottom:none;padding:8px 20px calc(28px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;}
.overlay.show .sheet{transform:none;}
.grab{width:38px;height:4px;border-radius:99px;background:var(--line-strong);margin:8px auto 18px;}
.sheet h3{font-size:19px;font-weight:680;margin-bottom:18px;}
.toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg);font-size:13.5px;font-weight:560;padding:11px 18px;border-radius:99px;opacity:0;pointer-events:none;transition:.25s;z-index:50;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%);}
</style>
</head>
<body>
<div class='topbar'>
  <div class='tt'><span class='month-pill' id='monthPill'></span><span id='pageTitle'>Сегодня</span></div>
  <button id='avatar'>Y</button>
</div>

<div class='page active' id='p-dash'>
  <div id='dashReminder'></div>
  <section><div class='quote'><div class='quote-t' id='quoteText'></div><div class='quote-a' id='quoteAuthor'></div></div></section>
  <section><div class='hero'><div class='hero-top'><span>Прогресс по целям</span><span class='hero-pct' id='dashPct'>0%</span></div><div class='track'><span id='dashBar'></span></div><div class='hero-sub' id='dashGoalsLine'></div></div></section>
  <section><div class='stat-grid'>
    <div class='stat'><div class='sv' id='stStreak'>0</div><div class='sl'>Лучший стрик, дн.</div></div>
    <div class='stat'><div class='sv' id='stHabits'>0/0</div><div class='sl'>Привычки сегодня</div></div>
    <div class='stat'><div class='sv' id='stGoals'>0</div><div class='sl'>Активные цели</div></div>
    <div class='stat'><div class='sv' id='stJournal'>0</div><div class='sl'>Записи за месяц</div></div>
  </div></section>
  <section><div class='yearw' id='yearCard'><div class='yt'><span id='yearLabel'>Год</span><b id='yearPct'>0%</b></div><div class='track' style='margin-top:12px'><span id='yearBar'></span></div><div class='hero-sub' id='yearSub' style='margin-top:8px'></div></div></section>
  <section><div class='chart'><h3><span>Привычки · 14 дней</span><span id='habitChartSum'></span></h3><div id='habitChart'></div><div class='chart-cap'>Сколько привычек отмечено каждый день</div></div></section>
  <section><div class='chart'><h3><span>Цели по категориям</span></h3><div id='catChart'></div></div></section>
  <section><button class='btn ghost' id='monthlyBtn'>Итоги месяца →</button></section>
  <section><div class='sec-head'><h2>Ближайшие цели</h2><button class='sec-link' data-go='goals'>Все</button></div><div id='dashGoals' class='list'></div></section>
</div>

<div class='page' id='p-goals'>
  <div class='seg' id='goalFilter'><button data-f='all' class='on'>Все</button><button data-f='active'>Активные</button><button data-f='done'>Готово</button></div>
  <div class='chips' id='catChips'></div>
  <div id='goalsList' class='list'></div>
</div>

<div class='page' id='p-habits'>
  <div id='habitsList' class='list'></div>
</div>

<div class='page' id='p-journal'>
  <div class='searchbar'><input id='jSearch' placeholder='Поиск по дневнику…'/></div>
  <div id='journalList' class='list'></div>
</div>

<button class='fab' id='fab'>+</button>

<div class='tabbar'>
  <button class='tab active' data-tab='dash'><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><path d='M3 10.5 12 3l9 7.5'/><path d='M5 9.5V21h14V9.5'/></svg><span>Сегодня</span></button>
  <button class='tab' data-tab='goals'><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='9'/><path d='M8 12l3 3 5-6'/></svg><span>Цели</span></button>
  <button class='tab' data-tab='habits'><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4.5' width='18' height='16' rx='2'/><path d='M3 9h18M8 3v3M16 3v3'/></svg><span>Привычки</span></button>
  <button class='tab' data-tab='journal'><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><path d='M5 4a2 2 0 0 1 2-2h13v16H7a2 2 0 0 0-2 2V4z'/><path d='M5 20a2 2 0 0 1 2-2h13'/></svg><span>Дневник</span></button>
</div>

<div class='overlay' id='overlay'><div class='sheet' id='sheet'></div></div>
<div class='toast' id='toast'></div>

<script src='app.js'></script>
</body>
</html>
