<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0A0A0B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Мои Цели" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<title>Мои Цели</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0A0A0B; --surface:#141416; --surface-2:#1A1A1D;
    --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.15);
    --ink:#F4F4F2; --ink-2:#9B9B9F; --ink-3:#64646A;
    --accent:#F4F4F2; --accent-ink:#0A0A0B;
    --green:#7FC8A0; --red:#E08C84; --amber:#D8B26A;
    --r:16px; --r-lg:20px;
  }
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    font-size:16px; line-height:1.5; letter-spacing:-0.01em;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100vh; padding-bottom:calc(104px + env(safe-area-inset-bottom));
  }
  .app{max-width:480px;margin:0 auto;padding:0 20px;}

  header.top{padding:calc(26px + env(safe-area-inset-top)) 0 4px;}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;}
  .head-row{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
  .ttl{font-size:30px;font-weight:700;letter-spacing:-0.035em;}
  .avatar{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--surface);
    color:var(--ink);font-size:15px;font-weight:600;cursor:pointer;display:grid;place-items:center;}

  .page{display:none;}
  .page.active{display:block;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  section{margin-top:22px;}

  .hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;}
  .hero-top{display:flex;align-items:baseline;justify-content:space-between;}
  .hero-label{font-size:13px;color:var(--ink-2);font-weight:500;}
  .hero-pct{font-size:34px;font-weight:700;letter-spacing:-0.03em;}
  .track{height:6px;border-radius:99px;background:rgba(255,255,255,.07);margin:16px 0 10px;overflow:hidden;}
  .track > span{display:block;height:100%;width:0;border-radius:99px;background:var(--accent);transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .hero-sub{font-size:13px;color:var(--ink-3);}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 15px;display:flex;flex-direction:column;gap:7px;}
  .stat-num{font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1;}
  .stat-lbl{font-size:12px;color:var(--ink-2);font-weight:500;}

  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
  .sec-head h2{font-size:16px;font-weight:600;letter-spacing:-0.01em;}
  .sec-link{background:none;border:none;color:var(--ink-3);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}

  .list{display:flex;flex-direction:column;gap:10px;}
  .row{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:13px;}
  .check{flex:0 0 auto;width:22px;height:22px;border-radius:7px;border:1.5px solid var(--ink-3);background:transparent;color:transparent;cursor:pointer;display:grid;place-items:center;transition:.15s;}
  .check.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
  .row-main{flex:1;min-width:0;}
  .row-title{font-size:15px;font-weight:500;display:flex;align-items:center;gap:9px;line-height:1.35;}
  .is-done .row-title{color:var(--ink-3);text-decoration:line-through;}
  .row-meta{font-size:12.5px;color:var(--ink-3);margin-top:4px;}
  .pdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto;background:var(--ink-3);}
  .pdot.p-high{background:var(--red);}
  .pdot.p-mid{background:var(--amber);}
  .pdot.p-low{background:var(--ink-3);}
  .row-del{flex:0 0 auto;background:none;border:none;color:var(--ink-3);cursor:pointer;padding:4px;display:grid;place-items:center;opacity:.55;}
  .row-del:active{opacity:1;}

  .empty{border:1px dashed var(--line-strong);border-radius:var(--r);padding:32px 18px;text-align:center;color:var(--ink-3);font-size:14px;line-height:1.5;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;}
  .habit-head{display:flex;align-items:center;justify-content:space-between;}
  .habit-name{font-size:15px;font-weight:500;}
  .habit-right{display:flex;align-items:center;gap:12px;}
  .streak{font-size:12px;font-weight:600;color:var(--ink-2);}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:14px;}
  .day{aspect-ratio:1;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:.15s;}
  .day .dn{font-size:9px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .day .dd{font-size:12px;font-weight:600;color:var(--ink-2);}
  .day.on{background:var(--accent);border-color:var(--accent);}
  .day.on .dn,.day.on .dd{color:var(--accent-ink);}
  .day.today{box-shadow:inset 0 0 0 1.5px var(--line-strong);}
  .day.on.today{box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.3);}

  .jrnl{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;}
  .jrnl-head{display:flex;align-items:center;justify-content:space-between;}
  .jrnl-date{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);}
  .jrnl-mood{font-size:18px;}
  .jrnl-good{margin-top:12px;display:flex;flex-direction:column;gap:7px;}
  .jrnl-good .g{font-size:14px;color:var(--ink);display:flex;gap:9px;align-items:flex-start;line-height:1.4;}
  .jrnl-good .g::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--green);margin-top:7px;flex:0 0 auto;}
  .jrnl-text{font-size:14px;color:var(--ink-2);margin-top:12px;line-height:1.55;white-space:pre-wrap;}
  .jrnl-del{margin-top:12px;text-align:right;}
  .jrnl-del button{background:none;border:none;color:var(--ink-3);font-size:12.5px;cursor:pointer;font-family:inherit;}

  .seg{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:16px;}
  .seg button{flex:1;background:none;border:none;color:var(--ink-2);font-weight:500;font-size:13.5px;padding:9px;border-radius:9px;cursor:pointer;font-family:inherit;transition:.15s;}
  .seg button.on{background:var(--surface-2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line);}

  .fab{position:fixed;right:max(20px,calc(50% - 240px + 20px));bottom:calc(100px + env(safe-area-inset-bottom));
    width:54px;height:54px;border-radius:50%;border:none;background:var(--accent);color:var(--accent-ink);
    cursor:pointer;z-index:40;display:grid;place-items:center;box-shadow:0 10px 30px rgba(0,0,0,.55);transition:transform .12s;}
  .fab:active{transform:scale(.9);}

  nav.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(10,10,11,.82);
    backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
    border-top:1px solid var(--line);padding:10px 0 calc(10px + env(safe-area-inset-bottom));}
  .tabbar-in{max-width:480px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);padding:0 12px;}
  .tab{background:none;border:none;color:var(--ink-3);display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:4px 0;font-family:inherit;transition:color .15s;}
  .tab svg{width:22px;height:22px;display:block;}
  .tab .tl{font-size:10px;font-weight:500;letter-spacing:.01em;}
  .tab.active{color:var(--ink);}

  .overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  .sheet{background:var(--surface);width:100%;max-width:480px;border-radius:24px 24px 0 0;border:1px solid var(--line);border-bottom:none;
    padding:20px 20px calc(26px + env(safe-area-inset-bottom));animation:up .32s cubic-bezier(.2,.85,.25,1);max-height:92vh;overflow-y:auto;}
  @keyframes up{from{transform:translateY(100%);}to{transform:none;}}
  .grab{width:36px;height:4px;border-radius:99px;background:var(--line-strong);margin:0 auto 18px;}
  .sheet h3{font-size:19px;font-weight:600;letter-spacing:-0.02em;margin-bottom:18px;}
  .fld{display:block;margin-bottom:14px;}
  .fld .lt{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;}
  input,select,textarea{width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:13px 14px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s;}
  input::placeholder,textarea::placeholder{color:var(--ink-3);}
  input:focus,select:focus,textarea:focus{border-color:var(--line-strong);}
  textarea{resize:vertical;min-height:84px;line-height:1.5;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .mood-pick{display:flex;gap:8px;}
  .mood-pick button{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;font-size:22px;padding:10px 0;cursor:pointer;transition:.15s;}
  .mood-pick button.on{border-color:var(--line-strong);background:#232327;transform:scale(1.05);}
  .btn{width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}
  .btn:active{opacity:.9;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink-2);margin-top:10px;}
  .mini{font-size:12.5px;color:var(--ink-3);text-align:center;margin-top:14px;line-height:1.5;}

  .toast{position:fixed;bottom:calc(110px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(8px);
    background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:99px;font-size:13.5px;font-weight:600;
    z-index:80;opacity:0;pointer-events:none;transition:.3s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="eyebrow" id="monthPill">Июнь 2026</div>
    <div class="head-row">
      <h1 class="ttl" id="pageTitle">Сегодня</h1>
      <button class="avatar" id="avatar">Y</button>
    </div>
  </header>

  <!-- DASHBOARD -->
  <div class="page active" id="p-dash">
    <section>
      <div class="hero">
        <div class="hero-top"><span class="hero-label">Прогресс целей</span><span class="hero-pct" id="dashPct">0%</span></div>
        <div class="track"><span id="dashBar"></span></div>
        <div class="hero-sub" id="dashGoalsLine">0 из 0 выполнено</div>
      </div>
    </section>
    <section>
      <div class="stat-grid">
        <div class="stat"><span class="stat-num" id="stStreak">0</span><span class="stat-lbl">Лучший стрик, дней</span></div>
        <div class="stat"><span class="stat-num" id="stHabits">0/0</span><span class="stat-lbl">Привычки сегодня</span></div>
        <div class="stat"><span class="stat-num" id="stGoals">0</span><span class="stat-lbl">Активные цели</span></div>
        <div class="stat"><span class="stat-num" id="stJournal">0</span><span class="stat-lbl">Записи за месяц</span></div>
      </div>
    </section>
    <section>
      <div class="sec-head"><h2>Ближайшие цели</h2><button class="sec-link" data-go="goals">Все</button></div>
      <div id="dashGoals" class="list"></div>
    </section>
  </div>

  <!-- GOALS -->
  <div class="page" id="p-goals">
    <div class="seg" id="goalFilter">
      <button class="on" data-f="all">Все</button>
      <button data-f="active">Активные</button>
      <button data-f="done">Готово</button>
    </div>
    <div id="goalsList" class="list"></div>
  </div>

  <!-- HABITS -->
  <div class="page" id="p-habits">
    <div id="habitsList" class="list"></div>
  </div>

  <!-- JOURNAL -->
  <div class="page" id="p-journal">
    <div id="journalList" class="list"></div>
  </div>
</div>

<button class="fab" id="fab" aria-label="Добавить"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>

<nav class="tabbar">
  <div class="tabbar-in">
    <button class="tab active" data-tab="dash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg><span class="tl">Главная</span></button>
    <button class="tab" data-tab="goals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.5"/></svg><span class="tl">Цели</span></button>
    <button class="tab" data-tab="habits"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9.5h17M8 3v3M16 3v3"/></svg><span class="tl">Привычки</span></button>
    <button class="tab" data-tab="journal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 4.5 19.5 7.5 9 18l-4 1 1-4z"/></svg><span class="tl">Дневник</span></button>
  </div>
</nav>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
